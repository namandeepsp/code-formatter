services:
  - type: web
    name: code-formatter
    runtime: docker
    repo: https://github.com/namandeepsp/code-formatter
    plan: free  # or upgrade to starter ($7/mo) for better stability
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_KEY
        sync: false  # Set in dashboard
      - key: JAVA_OPTS
        value: "-Xmx256m"
    healthCheckPath: /ping
    autoDeploy: true
    numInstances: 1
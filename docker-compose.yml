services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - TESTING=${TESTING:-false}
      - API_KEY=${API_KEY:-}
      - FORMATTER_TIMEOUT=${FORMATTER_TIMEOUT:-10}
      - FORMATTER_WORKERS=${FORMATTER_WORKERS:-2}
      - JAVA_FORMATTER_PATH=/app/google-java-format.jar
      - PYTHONUNBUFFERED=1
    volumes:
      - ./google-java-format.jar:/app/google-java-format.jar:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
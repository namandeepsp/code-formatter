name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Build Docker image
      run: docker build -t code-formatter .
    
    - name: Run container
      run: |
        docker run -d \
          --name formatter-test \
          -p 8000:8000 \
          --memory="512m" \
          --memory-swap="512m" \
          -e ENVIRONMENT=development \
          -e TESTING=true \
          -e ENABLE_JAVA=false \
          code-formatter
    
    - name: Wait for service
      run: |
        for i in {1..10}; do
          if curl -s http://localhost:8000/ping; then
            echo "Service ready!"
            break
          fi
          sleep 2
        done
    
    - name: Install test dependencies
      run: |
        pip install requests pytest pytest-timeout
    
    - name: Run integration tests
      run: |
        # Create simple integration test
        cat > test_integration.py << 'EOF'
        import requests
        import pytest
        
        BASE_URL = "http://localhost:8000"
        
        def test_ping():
            r = requests.get(f"{BASE_URL}/ping", timeout=5)
            assert r.status_code == 200
        
        def test_health():
            r = requests.get(f"{BASE_URL}/health", timeout=5)
            assert r.status_code in [200, 503]
        
        def test_python_format():
            r = requests.post(
                f"{BASE_URL}/api/format",
                json={"code": "def test(): pass", "language": "python"},
                timeout=10
            )
            assert r.status_code == 200
            data = r.json()
            assert data["success"] is True
        
        def test_languages():
            r = requests.get(f"{BASE_URL}/api/format/languages", timeout=5)
            assert r.status_code == 200
            data = r.json()
            assert "python" in data["data"]["languages"]
        EOF
        
        pytest test_integration.py -v
    
    - name: Show logs on failure
      if: failure()
      run: docker logs formatter-test
    
    - name: Check memory usage
      run: docker stats --no-stream formatter-test
